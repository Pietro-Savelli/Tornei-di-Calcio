spring.application.name=tornei-di-calcio
#==================================
# = Datasource (Database)
#==================================
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
# Queste righe servono per vedere i comandi SQL nel terminale di IntelliJ
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace

spring.jpa.hibernate.ddl-auto=create
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/tornei_di_calcio
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

#==================================
# = Web server
#==================================
server.port=8080

#==================================
# = Thymeleaf configurations
#==================================
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.servlet.content-type=text/html
# Disabilitare la cache e' fondamentale in sviluppo per vedere le modifiche HTML senza riavviare
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
#==================================
#mi va a prendere gli errori dentro messages nel file properties
spring.messages.basename=messages/messages
spring.messages.encoding=ISO-8859-1