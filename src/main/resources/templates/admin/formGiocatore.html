<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${giocatore.id != null} ? 'Modifica Giocatore' : 'Nuovo Giocatore'">Giocatore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/stile.css}">
    <link rel="stylesheet" th:href="@{/css/admin-form.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container page">

<h1 class="page-title"
    th:text="${giocatore.id != null} ? 'Modifica Giocatore' : 'Nuovo Giocatore'">
</h1>
<p class="page-subtitle"
   th:text="${giocatore.id != null}
       ? 'Modifica i dati del giocatore.'
       : 'Inserisci i dati del nuovo giocatore e assegnalo a una squadra.'">
</p>

<div class="form-card">
    <h2>Dati Giocatore</h2>

    <form th:action="${giocatore.id != null}
                    ? @{/admin/giocatori/{id}/edit(id=${giocatore.id})}
                    : @{/admin/giocatori/new}"
          th:object="${giocatore}"
          method="POST">

        <input type="hidden" th:if="${giocatore.id != null}" th:field="*{id}" />

        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" th:field="*{nome}" placeholder="es. Marco" required />
            <span class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div class="form-group">
            <label for="cognome">Cognome</label>
            <input type="text" id="cognome" th:field="*{cognome}" placeholder="es. Rossi" required />
            <span class="field-error" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></span>
        </div>

        <div class="form-group">
            <label for="dataDiNascita">Data di Nascita</label>
            <input type="date" id="dataDiNascita" name="dataDiNascita"
                   th:value="${giocatore.dataDiNascita != null}
                              ? ${#temporals.format(giocatore.dataDiNascita, 'yyyy-MM-dd')}
                              : ''"
                   required />
            <span class="field-error" th:if="${#fields.hasErrors('dataDiNascita')}" th:errors="*{dataDiNascita}"></span>
        </div>

        <div class="form-group">
            <label for="ruolo">Ruolo</label>
            <select id="ruolo" th:field="*{ruolo}" required>
                <option value="">-- Seleziona ruolo --</option>
                <option th:each="r : ${T(it.uniroma3.torneidicalcio.model.Ruolo).values()}"
                        th:value="${r}" th:text="${r}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="altezza">Altezza (cm)</label>
            <input type="number" id="altezza" th:field="*{altezza}"
                   min="100" max="250" placeholder="es. 182" />
        </div>

        <div class="form-group">
            <label for="squadra">Squadra</label>
            <select id="squadra" name="squadra.id">
                <option value="">-- Nessuna squadra --</option>
                <option th:each="s : ${squadre}"
                        th:value="${s.id}"
                        th:text="${s.nome}"
                        th:selected="${giocatore.squadra != null and giocatore.squadra.id == s.id}">
                </option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success"
                    th:text="${giocatore.id != null} ? '💾 Salva Modifiche' : '➕ Crea Giocatore'">
            </button>
            <a th:href="@{/squadre/}" class="btn btn-secondary">↩️ Annulla</a>
        </div>
    </form>
</div>

<a href="/squadre/" class="back-link">← Torna all'elenco squadre</a>

</div>

</body>
</html>
