<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Calendario</title>
</head>
<body>

<h1>Partite</h1>
<h2>Totale = [[${calendario.size()}]]</h2>

<ul>
    <li th:each="partita: ${calendario}">
        <a th:href="@{'/tornei/' + ${partita.torneo.id} + '/calendario/partita/' + ${partita.id}}"
           th:text="${partita.squadraCasa.nome + ' vs ' + partita.squadraOspite.nome}">USA vs Mexico</a>
        <span th:text="${#temporals.format(partita.dataOra, 'dd/MM/yyyy HH:mm')}">11/05/2026 11:30</span>
    </li>
</ul>


<div sec:authorize="hasAuthority('ADMIN')" th:if="${!calendario.isEmpty()}">
    <h2>🔧 Gestione</h2>
    <a th:href="@{'/admin/tornei/' + ${calendario[0].torneo.id} + '/edit'}">
        Torna alla pagina di modifica del torneo
    </a>
</div>


<div style="margin-top: 20px;">
    <a th:href="@{/tornei/}">↩️ Torna alla pagina dei tornei</a>
</div>

</body>
</html>
