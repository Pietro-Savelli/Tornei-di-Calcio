<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Squadre</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body class="dark-theme">

<div class="container">
    <h1>👥 Squadre</h1>
    <h2 style="color:var(--text-muted);">Totale = [[${squadre.size()}]]</h2>

    <div sec:authorize="hasAuthority('ADMIN')">
        <a th:href="@{/admin/squadre/new}" class="btn btn-create">➕ Crea Nuova Squadra</a>
    </div>

    <ul style="list-style:none; padding:0;">
        <li th:each="squadra: ${squadre}" class="item-card">
            <div style="display:flex; align-items:center; gap:12px;">
                <a th:href="@{'/squadre/' + ${squadra.id}}" style="font-weight:700; font-size:1.1rem; color:var(--text); text-decoration:none;" th:text="${squadra.nome}">Lazio</a>
                <span style="color:var(--text-muted); font-size:0.9rem;" th:text="${squadra.citta}">Roma</span>
            </div>
            <div sec:authorize="hasAuthority('ADMIN')" style="display:flex; gap:10px;">
                <a th:href="@{'/admin/squadre/' + ${squadra.id} + '/edit'}" class="btn btn-edit">✏️ Modifica</a>
                <button type="button" class="btn btn-delete"
                        th:attr="onclick=|apriModale('@{/admin/squadre/{id}/delete(id=${squadra.id})}', '${squadra.nome}')|">
                    🗑️ Elimina
                </button>
            </div>
        </li>
    </ul>

    <a href="/tornei/" style="color:var(--text-muted);">↩ Torna ai tornei</a>
</div>

<div th:replace="~{fragments/modale :: elimina}"></div>

</body>
</html>
