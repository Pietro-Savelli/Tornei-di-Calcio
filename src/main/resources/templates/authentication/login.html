<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · SIW Tornei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body>

<div class="auth-wrap">
    <div class="auth-card">
        <h1>Accedi</h1>
        <p class="auth-sub">Bentornato! Inserisci le tue credenziali.</p>

        <div th:if="${param.error != null}" class="auth-error" style="text-align:center; margin-bottom:14px;">
            Username o password errati
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="auth-field">
                <label>Username</label>
                <input name="username" type="text" placeholder="Username" required />
            </div>
            <div class="auth-field">
                <label>Password</label>
                <input name="password" type="password" placeholder="Password" required />
            </div>
            <div class="auth-actions">
                <button type="submit" class="btn btn-accent">Login</button>
            </div>
        </form>

        <p class="auth-foot">Non hai un account? <a th:href="@{/register}">Registrati</a></p>
        <p class="auth-foot"><a href="/">← Torna alla home</a></p>
    </div>
</div>

</body>
</html>
