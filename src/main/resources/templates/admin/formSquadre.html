<form th:action="${squadra.id != null} ? @{/admin/squadre/{id}/edit(id=${squadra.id})} : @{/admin/squadre/new}"
      th:object="${squadra}" method="POST">

    <input type="hidden" th:field="*{id}" />   ← AGGIUNTO

    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required />
        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
    </div>

    <div>
        <label for="citta">Città:</label>
        <input type="text" id="citta" th:field="*{citta}" required />
        <span th:if="${#fields.hasErrors('citta')}" th:errors="*{citta}">Errore città</span>
    </div>

    <div>
        <label for="annoFondazione">Anno Fondazione:</label>
        <input type="number" id="annoFondazione" th:field="*{annoFondazione}" />
    </div>

    <button type="submit" th:text="${squadra.id != null} ? 'Salva Modifiche' : 'Crea Squadra'">Salva</button>
    <a th:href="@{/squadre/}">Annulla</a>
</form>
