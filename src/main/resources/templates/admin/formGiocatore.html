<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${giocatore.id != null} ? 'Modifica Giocatore' : 'Nuovo Giocatore'">Giocatore</title>
</head>
<body>
<h1 th:text="${giocatore.id != null} ? 'Modifica Giocatore' : 'Crea Nuovo Giocatore'">Form Giocatore</h1>

<form th:action="${giocatore.id != null} ? @{/admin/giocatori/{id}/edit(id=${giocatore.id})} : @{/admin/giocatori/new}"
      th:object="${giocatore}" method="POST">

    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required />
        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
    </div>

    <div>
        <label for="cognome">Cognome:</label>
        <input type="text" id="cognome" th:field="*{cognome}" required />
        <span th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}">Errore cognome</span>
    </div>

    <div>
        <label for="dataDiNascita">Data di Nascita:</label>
        <input type="date" id="dataDiNascita" th:field="*{dataDiNascita}" required />
        <span th:if="${#fields.hasErrors('dataDiNascita')}" th:errors="*{dataDiNascita}">Errore data</span>
    </div>

    <div>
        <label for="ruolo">Ruolo:</label>
        <select id="ruolo" th:field="*{ruolo}" required>
            <option th:each="r : ${T(it.uniroma3.torneidicalcio.model.Ruolo).values()}"
                    th:value="${r}" th:text="${r}">PORTIERE</option>
        </select>
    </div>

    <div>
        <label for="altezza">Altezza (cm):</label>
        <input type="number" id="altezza" th:field="*{altezza}" />
    </div>

    <div>
        <label for="squadra">Squadra:</label>
        <select id="squadra" name="squadra.id">
            <option value="">-- Seleziona Squadra --</option>
            <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"
                    th:selected="${giocatore.squadra != null and giocatore.squadra.id == s.id}">Squadra</option>
        </select>
    </div>

    <button type="submit" th:text="${giocatore.id != null} ? 'Salva Modifiche' : 'Crea Giocatore'">Salva</button>
    <a th:href="@{/squadre/}">Annulla</a>
</form>
</body>
</html>
