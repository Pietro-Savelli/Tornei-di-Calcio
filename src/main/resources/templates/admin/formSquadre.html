<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${squadra.id != null} ? 'Modifica Squadra' : 'Nuova Squadra'">Squadra</title>
    <link rel="stylesheet" th:href="@{/css/admin-form.css}">
</head>
<body>

<h1 class="page-title"
    th:text="${squadra.id != null} ? '✏️ Modifica Squadra' : '➕ Nuova Squadra'">
    Squadra
</h1>
<p class="page-subtitle"
   th:text="${squadra.id != null}
       ? 'Modifica i dati della squadra e salva.'
       : 'Compila i campi per aggiungere una nuova squadra al sistema.'">
</p>

<div class="form-card">
    <h2>📋 Dati Squadra</h2>

    <form th:action="${squadra.id != null}
                    ? @{/admin/squadre/{id}/edit(id=${squadra.id})}
                    : @{/admin/squadre/new}"
          th:object="${squadra}"
          method="POST">

        <!--
            Il campo hidden con l'id serve solo in modifica:
            Thymeleaf usa l'oggetto nel model per i binding,
            ma inviare l'id evita confusione se il service lo usa.
        -->
        <input type="hidden" th:if="${squadra.id != null}" th:field="*{id}" />

        <div class="form-group">
            <label for="nome">Nome squadra</label>
            <input type="text" id="nome" th:field="*{nome}"
                   placeholder="es. S.S. Lazio" required />
            <span class="field-error"
                  th:if="${#fields.hasErrors('nome')}"
                  th:errors="*{nome}">
                Errore nome
            </span>
        </div>

        <div class="form-group">
            <label for="citta">Città</label>
            <input type="text" id="citta" th:field="*{citta}"
                   placeholder="es. Roma" required />
            <span class="field-error"
                  th:if="${#fields.hasErrors('citta')}"
                  th:errors="*{citta}">
                Errore città
            </span>
        </div>

        <div class="form-group">
            <label for="annoFondazione">Anno di fondazione</label>
            <input type="number" id="annoFondazione" th:field="*{annoFondazione}"
                   min="1800" max="2100" placeholder="es. 1900" />
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success"
                    th:text="${squadra.id != null} ? '💾 Salva Modifiche' : '➕ Crea Squadra'">
                Salva
            </button>
            <a th:href="@{/squadre/}" class="btn btn-secondary">↩️ Annulla</a>
        </div>
    </form>
</div>

<a href="/squadre/" class="back-link">← Torna all'elenco squadre</a>

</body>
</html>
