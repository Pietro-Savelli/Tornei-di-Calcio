<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Errore 403 - Accesso Negato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container text-center">
    <h1 class="display-1 fw-bold text-danger">403</h1>
    <h2 class="mb-4">Accesso Negato</h2>
    <p class="lead text-muted mb-5">
        Cartellino rosso! Non hai i permessi di amministratore per gestire questa sezione o modificare questa partita.
    </p>
    <a th:href="@{/login}" class="btn btn-outline-danger px-4 py-2 me-2">Cambia Account (Login)</a>
    <a th:href="@{/}" class="btn btn-primary px-4 py-2">Torna al campo principale</a>
</div>
</body>
</html>
