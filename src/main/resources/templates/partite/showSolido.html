<h3>Commenti</h3>
<ul>
    <li th:each="c : ${partita.commenti}">

        <div th:id="'view-mode-' + ${c.id}">
            <p>
                <strong th:text="${c.utente.username}">Username</strong>
                (<span th:text="${#temporals.format(c.dataOra, 'dd/MM/yyyy HH:mm')}">10/06/2026 15:00</span>):
                <span th:text="${c.testo}">Testo del commento</span>
            </p>

            <div th:if="${utenteLoggato != null and utenteLoggato.id == c.utente.id}">
                <button type="button" th:onclick="'toggleEdit(' + ${c.id} + ')'">Modifica</button>
            </div>
        </div>

        <div th:id="'edit-mode-' + ${c.id}" style="display: none;" th:if="${utenteLoggato != null and utenteLoggato.id == c.utente.id}">
            <form th:action="@{/partite/{id}/commenti/{commentoId}/edit(id=${partita.id}, commentoId=${c.id})}" method="POST">
                <input type="text" name="testo" th:value="${c.testo}" required />
                <button type="submit">Salva</button>
                <button type="button" th:onclick="'toggleEdit(' + ${c.id} + ')'">Annulla</button>
            </form>
        </div>

    </li>
</ul>

<div th:if="${utenteLoggato != null}">
    <h4>Inserisci un commento</h4>
    <form th:action="@{/partite/{id}/commenti(id=${partita.id})}" method="POST">
        <textarea name="testo" placeholder="Scrivi un commento..." required></textarea>
        <br/>
        <button type="submit">Invia</button>
    </form>
</div>
<div th:unless="${utenteLoggato != null}">
    <p><a th:href="@{/login}">Accedi</a> per lasciare un commento.</p>
</div>

<script>
    function toggleEdit(commentId) {
        var viewDiv = document.getElementById('view-mode-' + commentId);
        var editDiv = document.getElementById('edit-mode-' + commentId);

        if (editDiv.style.display === 'none') {
            viewDiv.style.display = 'none';
            editDiv.style.display = 'block';
        } else {
            viewDiv.style.display = 'block';
            editDiv.style.display = 'none';
        }
    }
</script>
