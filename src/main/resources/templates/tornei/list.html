<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Tornei</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body class="dark-theme">

<div class="container">
    <h1>🏆 Tornei</h1>
    <h2 style="color:var(--text-muted);">Totale = [[${tornei.size()}]]</h2>

    <div sec:authorize="hasAuthority('ADMIN')">
        <a th:href="@{/admin/tornei/new}" class="btn btn-create">➕ Crea Nuovo Torneo</a>
    </div>

    <ul style="list-style:none; padding:0;">
        <li th:each="torneo: ${tornei}" class="item-card">
            <div style="display:flex; align-items:center; gap:12px;">
                <a th:href="@{'/tornei/' + ${torneo.id}}" style="font-weight:700; font-size:1.1rem; color:var(--text); text-decoration:none;" th:text="${torneo.nome}">Serie A</a>
                <span style="color:var(--text-muted); font-size:0.9rem;" th:text="'(' + ${torneo.anno} + ')'">(2024)</span>
            </div>
            <div sec:authorize="hasAuthority('ADMIN')" style="display:flex; gap:10px;">
                <a th:href="@{'/admin/tornei/' + ${torneo.id} + '/edit'}" class="btn btn-edit">✏️ Modifica</a>
                <button type="button" class="btn btn-delete"
                        th:attr="onclick=|apriModale('@{/admin/tornei/{id}/delete(id=${torneo.id})}', '${torneo.nome}')|">
                    🗑️ Elimina
                </button>
            </div>
        </li>
    </ul>

    <a href="/tornei/" style="color:var(--text-muted);">↩ Torna ai tornei</a>
</div>

<div th:replace="~{fragments/modale :: elimina}"></div>

</body>
</html>
